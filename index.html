<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>SpaceShip</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: monospace; touch-action: none; -webkit-touch-callout: none; position: fixed; width: 100%; height: 100%; }
canvas { display: block; }
#ui {
  position: fixed; top: 10px; left: 10px; color: #0f0; font-size: 14px;
  text-shadow: 0 0 5px #0f0; z-index: 10; pointer-events: none;
}
#message {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  color: #8f8; font-size: 16px; text-shadow: 0 0 10px #0f0;
  z-index: 10; pointer-events: none; text-align: center; opacity: 0;
  transition: opacity 0.5s;
}
#start-screen {
  position: fixed; inset: 0; background: #000; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #0f0; font-family: monospace;
}
#start-screen h1 { font-size: 48px; text-shadow: 0 0 20px #0f0; margin-bottom: 10px; }
#start-screen .subtitle { color: #888; font-size: 16px; margin-bottom: 40px; font-style: italic; }
#start-screen .controls { color: #0a0; font-size: 14px; line-height: 2; margin-bottom: 30px; text-align: center; }
#start-screen button {
  background: none; border: 2px solid #0f0; color: #0f0; padding: 15px 40px;
  font-size: 20px; font-family: monospace; cursor: pointer;
  text-shadow: 0 0 10px #0f0; box-shadow: 0 0 20px rgba(0,255,0,0.3);
  transition: all 0.3s;
}
#start-screen button:hover { background: #0f0; color: #000; }
/* Mobile touch controls */
#touch-controls { display:none; position:fixed; inset:0; z-index:20; pointer-events:none; }
#touch-controls.active { display:block; }
#joystick-zone { position:absolute; left:10px; bottom:10px; width:160px; height:160px; pointer-events:auto; touch-action:none; }
#joystick-base { width:120px; height:120px; border-radius:50%; background:rgba(0,255,0,0.1); border:2px solid rgba(0,255,0,0.25); position:absolute; left:20px; bottom:20px; }
#joystick-thumb { width:50px; height:50px; border-radius:50%; background:rgba(0,255,0,0.35); border:2px solid rgba(0,255,0,0.5); position:absolute; left:55px; bottom:55px; transform:translate(-50%,-50%); transition:none; }
.touch-btn { position:absolute; pointer-events:auto; touch-action:none; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:monospace; font-weight:bold; user-select:none; -webkit-user-select:none; }
.touch-btn.active { filter:brightness(1.5); }
#btn-beam { right:20px; bottom:80px; width:70px; height:70px; background:rgba(0,255,100,0.2); border:2px solid rgba(0,255,100,0.5); color:#0f0; font-size:10px; }
#btn-missile { right:100px; bottom:120px; width:52px; height:52px; background:rgba(255,100,0,0.2); border:2px solid rgba(255,100,0,0.5); color:#f80; font-size:9px; }
#btn-flame { right:100px; bottom:55px; width:52px; height:52px; background:rgba(255,50,0,0.2); border:2px solid rgba(255,50,0,0.5); color:#f40; font-size:9px; }
#btn-repulsor { right:20px; bottom:160px; width:48px; height:48px; background:rgba(255,50,50,0.2); border:2px solid rgba(255,50,50,0.5); color:#f44; font-size:8px; }
#btn-boost { left:10px; bottom:180px; width:48px; height:48px; background:rgba(255,150,0,0.2); border:2px solid rgba(255,150,0,0.5); color:#fa0; font-size:8px; }
#btn-fullscreen { position:fixed; top:10px; right:10px; z-index:25; width:36px; height:36px; background:rgba(0,255,0,0.15); border:1px solid rgba(0,255,0,0.4); color:#0f0; font-size:16px; cursor:pointer; border-radius:4px; display:none; font-family:monospace; }
@media (max-width:900px),(hover:none){
  #start-screen h1 { font-size:28px; }
  #start-screen .controls { font-size:11px; line-height:1.8; }
  #start-screen button { padding:12px 30px; font-size:16px; }
  #ui { font-size:11px; }
  #message { font-size:13px; bottom:25px; }
}
</style>
</head>
<body>

<div id="start-screen" style="display:none"></div>

<div id="ui">
  <div><span id="specimens-label">SPECIMENS COLLECTED:</span> <span id="score">0</span></div>
  <div><span id="structures-label">STRUCTURES RUINED:</span> <span id="buildings">0</span></div>
  <div id="planet-name"></div>
  <div id="sad-fact"></div>
</div>
<div id="message"></div>
<button id="btn-fullscreen" onclick="toggleFullscreen()">[ ]</button>

<div id="touch-controls">
  <div id="joystick-zone">
    <div id="joystick-base"></div>
    <div id="joystick-thumb"></div>
  </div>
  <div id="btn-beam" class="touch-btn">BEAM</div>
  <div id="btn-missile" class="touch-btn">MSL</div>
  <div id="btn-flame" class="touch-btn">FLM</div>
  <div id="btn-repulsor" class="touch-btn">REP</div>
  <div id="btn-boost" class="touch-btn">BST</div>
  <div id="btn-exit" class="touch-btn" style="left:80px;bottom:180px;width:48px;height:48px;background:rgba(0,200,255,0.2);border:2px solid rgba(0,200,255,0.5);color:#0cf;font-size:8px;">EXIT</div>
  <div id="upgrade-btns" style="display:none;position:absolute;top:60px;left:50%;transform:translateX(-50%);pointer-events:auto;gap:8px;">
    <div class="touch-btn" id="btn-upg1" style="position:static;width:44px;height:44px;background:rgba(0,255,0,0.15);border:1px solid rgba(0,255,0,0.4);color:#0f0;font-size:8px;">BEM<br>+</div>
    <div class="touch-btn" id="btn-upg2" style="position:static;width:44px;height:44px;background:rgba(0,255,0,0.15);border:1px solid rgba(0,255,0,0.4);color:#0f0;font-size:8px;">SPD<br>+</div>
    <div class="touch-btn" id="btn-upg3" style="position:static;width:44px;height:44px;background:rgba(0,255,0,0.15);border:1px solid rgba(0,255,0,0.4);color:#0f0;font-size:8px;">FLM<br>+</div>
  </div>
</div>

<canvas id="game"></canvas>

<script type="module" src="/src/main.js"></script>
</body>
</html>
